<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordLab — 한봄고 사운드디자인과</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#07070f;color:#dde0ef;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
button{cursor:pointer;font-family:inherit;transition:all .12s;outline:none;}
button:active{transform:scale(.93);}
.lift:hover{transform:translateY(-2px);} .lift:active{transform:scale(.95);}
.pad{cursor:pointer;transition:transform .12s,border-color .13s,background .13s;}
.pad:active{transform:scale(.91);}
.rw{cursor:pointer;border-radius:9px;transition:background .11s,transform .11s;}
.rw:hover{background:rgba(255,255,255,.07)!important;transform:translateX(3px);}
input[type=text]{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#dde0ef;font-family:inherit;font-size:13px;padding:9px 13px;width:100%;outline:none;transition:border-color .12s;}
input[type=text]:focus{border-color:rgba(255,255,255,.28);}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:#1c1c2e;border-radius:2px;}
@keyframes br{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(34,211,160,.22);}60%{box-shadow:0 0 0 7px rgba(34,211,160,0);}}
@keyframes pulse{0%{transform:scale(1);}40%{transform:scale(1.06);}100%{transform:scale(1);}}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.fi{animation:fi .2s ease;}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){

// ─── THEORY ──────────────────────────────────────────────────────
const CHR=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const SCALES={
  Major:      {iv:[0,2,4,5,7,9,11],ql:["maj","min","min","maj","maj","min","dim"],col:"#22d3a0",ko:"장조"},
  "Nat.Minor":{iv:[0,2,3,5,7,8,10],ql:["min","dim","maj","min","min","maj","maj"],col:"#a78bfa",ko:"자연단조"},
  Dorian:     {iv:[0,2,3,5,7,9,10],ql:["min","min","maj","maj","min","dim","maj"],col:"#38bdf8",ko:"도리안"},
  Phrygian:   {iv:[0,1,3,5,7,8,10],ql:["min","maj","maj","min","dim","maj","min"],col:"#f87171",ko:"프리지안"},
  Lydian:     {iv:[0,2,4,6,7,9,11],ql:["maj","maj","min","dim","maj","min","min"],col:"#fbbf24",ko:"리디안"},
  Mixolydian: {iv:[0,2,4,5,7,9,10],ql:["maj","min","dim","maj","min","min","maj"],col:"#fb923c",ko:"믹소리디안"},
};
const CT={
  maj:{s:[0,4,7],x:"",l:"3화음"},   min:{s:[0,3,7],x:"m",l:"단"},
  dim:{s:[0,3,6],x:"°",l:"감"},     aug:{s:[0,4,8],x:"+",l:"증"},
  sus2:{s:[0,2,7],x:"sus2",l:"Sus2"}, sus4:{s:[0,5,7],x:"sus4",l:"Sus4"},
  maj7:{s:[0,4,7,11],x:"maj7",l:"Maj7"}, min7:{s:[0,3,7,10],x:"m7",l:"Min7"},
  dom7:{s:[0,4,7,10],x:"7",l:"Dom7"},    dim7:{s:[0,3,6,9],x:"°7",l:"Dim7"},
  hdim7:{s:[0,3,6,10],x:"ø7",l:"ø7"},   mmaj7:{s:[0,3,7,11],x:"mM7",l:"mMaj7"},
  add9:{s:[0,4,7,14],x:"add9",l:"add9"}, madd9:{s:[0,3,7,14],x:"madd9",l:"madd9"},
  maj9:{s:[0,4,7,11,14],x:"maj9",l:"Maj9"}, min9:{s:[0,3,7,10,14],x:"m9",l:"Min9"},
  dom9:{s:[0,4,7,10,14],x:"9",l:"Dom9"},
};
const DIA_EXT={
  base:{maj:"maj",min:"min",dim:"dim"},
  "7th":{maj:"maj7",min:"min7",dim:"hdim7"},
  "9th":{maj:"maj9",min:"min9",dim:"hdim7"},
};
const ROMAN=["I","II","III","IV","V","VI","VII"];

// ─── VOICE LEADING ────────────────────────────────────────────────
function n2m(n){const m=(n||"").match(/^([A-G]#?)(\d+)$/);if(!m)return-1;return CHR.indexOf(m[1])+(parseInt(m[2])+1)*12;}
function m2n(m){return CHR[((m%12)+12)%12]+(Math.floor(m/12)-1);}
function getVoicings(root,type){
  const ri=CHR.indexOf(root),ivs=(CT[type]||CT.maj).s,res=[];
  for(let inv=0;inv<Math.min(ivs.length,3);inv++){
    for(let oct=3;oct<=5;oct++){
      const rot=[...ivs.slice(inv),...ivs.slice(0,inv).map(s=>s+12)];
      const norm=[];rot.forEach((s,i)=>{let ns=s;if(i>0)while(ns<=norm[i-1])ns+=12;norm.push(ns);});
      const midis=norm.map(s=>{const p=(ri+s)%12;return p+(oct+Math.floor((ri+s)/12))*12+12;});
      if(midis[0]>=52&&midis[midis.length-1]<=80&&midis[midis.length-1]-midis[0]<=24)
        res.push({inv,oct,notes:midis.map(m2n),midis,label:["근","1전","2전"][inv]+"("+oct+")"});
    }
  }
  return res;
}
function voiceLead(root,type,pm){
  const cands=getVoicings(root,type);if(!cands.length)return null;
  if(!pm||!pm.length)return cands.find(c=>c.inv===0&&c.oct===4)||cands[0];
  let best=cands[0],bestS=Infinity;
  cands.forEach(c=>{
    let s=0;pm.forEach(p=>s+=Math.min(...c.midis.map(m=>Math.abs(m-p))));
    s+=Math.abs(c.midis.reduce((a,b)=>a+b,0)/c.midis.length-62)*0.12;
    if(s<bestS){bestS=s;best=c;}
  });
  return best;
}
function buildChord(root,type,pm,fi,fo){
  const cands=getVoicings(root,type);
  let v=fi!=null?cands.find(c=>c.inv===fi&&c.oct===fo):voiceLead(root,type,pm);
  if(!v)v={inv:0,oct:4,notes:[root+"4"],midis:[n2m(root+"4")],label:"근(4)"};
  return{root,type,name:root+(CT[type]||CT.maj).x,notes:v.notes,midis:v.midis,
    bassNote:root+"2",voicing:v,cands,
    midNotes:v.notes.slice(0,Math.min(3,v.notes.length)),shortNotes:v.notes.slice(0,2)};
}
function getDiatonic(root,sName,ext){
  const sc=SCALES[sName]||SCALES.Major;let pm=null;
  return sc.iv.map((iv,deg)=>{
    const r=CHR[(CHR.indexOf(root)+iv)%12],q0=sc.ql[deg],q=(DIA_EXT[ext]||DIA_EXT.base)[q0]||q0;
    const ch=buildChord(r,q,pm);pm=ch.midis;
    return{...ch,deg,roman:ROMAN[deg]+(q0==="maj"?"":q0==="min"?"m":"°"),baseType:q0};
  });
}

// ─── SHARED PATTERN ENGINE ───────────────────────────────────────
// 소리와 MIDI가 동일한 패턴을 사용 — 이것이 핵심 수정사항
// 반환값: [{t:초, ns:[노트명배열], v:0~1벨로시티, d:지속시간(초)}]
function getMD(ts,bpm){const q=60/bpm;return{"4/4":q*4,"3/4":q*3,"6/8":q*3,"2/4":q*2}[ts]||q*4;}

function getHits(ch,style,ts,bpm){
  const q=60/bpm;
  const bn=ch.bassNote;
  const cn=ch.notes||[];
  const mn=cn.slice(0,Math.min(3,cn.length));
  const sn=cn.slice(0,2);
  const hits=[];

  if(style==="piano"){
    // 피아노: 1·3박 베이스+코드 동시, 2·4박 코드만
    if(ts==="4/4"){
      hits.push({t:0,     ns:[bn],v:.82,d:q*.85});
      hits.push({t:0,     ns:mn,  v:.86,d:q*1.7});   // 베이스+코드 동시
      hits.push({t:q,     ns:mn,  v:.40,d:q*.55});
      hits.push({t:q*2,   ns:[bn],v:.72,d:q*.85});
      hits.push({t:q*2,   ns:mn,  v:.76,d:q*1.7});   // 베이스+코드 동시
      hits.push({t:q*3,   ns:mn,  v:.36,d:q*.55});
    }else if(ts==="3/4"){
      hits.push({t:0,     ns:[bn],v:.82,d:q*.85});
      hits.push({t:0,     ns:mn,  v:.85,d:q*2.5});   // 베이스+코드 동시
      hits.push({t:q,     ns:mn,  v:.42,d:q*.55});
      hits.push({t:q*2,   ns:mn,  v:.38,d:q*.55});
    }else if(ts==="6/8"){
      const e=q/2;
      hits.push({t:0,       ns:[bn],v:.82,d:e*.85});
      hits.push({t:0,       ns:mn,  v:.83,d:e*2.5});
      hits.push({t:e,       ns:sn,  v:.38,d:e*.45});
      hits.push({t:e*2,     ns:sn,  v:.42,d:e*.45});
      hits.push({t:e*3,     ns:[bn],v:.70,d:e*.82});
      hits.push({t:e*3.04,  ns:mn,  v:.74,d:e*2.4});
      hits.push({t:e*4,     ns:sn,  v:.36,d:e*.45});
      hits.push({t:e*5,     ns:sn,  v:.38,d:e*.45});
    }else{
      hits.push({t:0,     ns:[bn],v:.82,d:q*.85});
      hits.push({t:0,     ns:mn,  v:.85,d:q*1.7});   // 베이스+코드 동시
      hits.push({t:q,     ns:mn,  v:.42,d:q*.55});
    }
  }
  else if(style==="guitar"){
    // 기타: 스트럼 — 각 줄 22ms 간격으로 Down/Up 패턴
    // MIDI에서도 각 음을 순서대로 약간 다른 타이밍에
    const STRUM_GAP=0.022;
    function strum(t,ns,vel){
      ns.forEach((n,i)=>hits.push({t:t+i*STRUM_GAP,ns:[n],v:vel*(1-i*0.04),d:0.36}));
    }
    const all=[bn,...cn];
    if(ts==="4/4"){
      strum(0,      all,   .84);
      strum(q,      cn,    .42);
      strum(q*1.5,  cn,    .50);
      strum(q*2,    all,   .74);
      strum(q*2.5,  cn,    .38);
      strum(q*3,    cn,    .42);
      strum(q*3.5,  cn,    .46);
    }else if(ts==="3/4"){
      strum(0,      all,   .84);
      strum(q,      cn,    .48);
      strum(q*1.5,  cn,    .42);
      strum(q*2,    cn,    .44);
      strum(q*2.5,  cn,    .40);
    }else if(ts==="6/8"){
      const e=q/2;
      strum(0,      all,   .84);
      strum(e,      cn,    .38);
      strum(e*2,    cn,    .42);
      strum(e*3,    cn,    .76);
      strum(e*4,    cn,    .36);
      strum(e*5,    cn,    .40);
    }else{
      strum(0,      all,   .84);
      strum(q,      cn,    .44);
    }
  }
  else if(style==="ballad"){
    // 발라드: 아르페지오 — 베이스→음 순서로 펼침
    const gap=ts==="6/8"?q/4:q/3.2;
    if(ts==="4/4"){
      [0,q*2].forEach(off=>{
        hits.push({t:off,ns:[bn],v:.80,d:q*1.4});
        cn.forEach((n,i)=>hits.push({t:off+gap*(i+1),ns:[n],v:.58-i*.04,d:q*1.0}));
        hits.push({t:off+gap*(cn.length+1),ns:sn,v:.46,d:q*.65});
      });
    }else if(ts==="3/4"){
      hits.push({t:0,ns:[bn],v:.80,d:q*1.0});
      cn.forEach((n,i)=>hits.push({t:gap*(i+1),ns:[n],v:.56-i*.04,d:q*.9}));
    }else if(ts==="6/8"){
      const e=q/2;
      [0,e*3].forEach(off=>{
        hits.push({t:off,          ns:[bn],     v:.78,d:e*1.1});
        hits.push({t:off+e*.6,     ns:[cn[0]],  v:.55,d:e*.75});
        hits.push({t:off+e*1.1,    ns:sn,       v:.50,d:e*.75});
        hits.push({t:off+e*1.7,    ns:cn,       v:.46,d:e*.6});
      });
    }else{
      hits.push({t:0,ns:[bn],v:.78,d:q*.82});
      cn.forEach((n,i)=>hits.push({t:gap*(i+1),ns:[n],v:.54-i*.04,d:q*.7}));
    }
  }
  else{ // pop
    // 팝: 싱코페이션 + 오프비트 강조
    const allm=[bn,...mn];
    if(ts==="4/4"){
      hits.push({t:0,      ns:allm,v:.85,d:q*.82});
      hits.push({t:q*.75,  ns:mn,  v:.52,d:q*.45});
      hits.push({t:q*1.5,  ns:mn,  v:.58,d:q*.45});
      hits.push({t:q*2,    ns:allm,v:.76,d:q*.82});
      hits.push({t:q*2.75, ns:mn,  v:.50,d:q*.45});
      hits.push({t:q*3.5,  ns:mn,  v:.56,d:q*.45});
    }else if(ts==="3/4"){
      hits.push({t:0,      ns:allm,v:.85,d:q*.82});
      hits.push({t:q*.75,  ns:mn,  v:.48,d:q*.45});
      hits.push({t:q*1.5,  ns:mn,  v:.54,d:q*.45});
      hits.push({t:q*2.5,  ns:mn,  v:.48,d:q*.45});
    }else if(ts==="6/8"){
      const e=q/2;
      hits.push({t:0,      ns:allm,v:.85,d:e*.82});
      hits.push({t:e,      ns:mn,  v:.42,d:e*.45});
      hits.push({t:e*1.5,  ns:mn,  v:.52,d:e*.45});
      hits.push({t:e*3,    ns:allm,v:.76,d:e*.82});
      hits.push({t:e*4,    ns:mn,  v:.40,d:e*.45});
      hits.push({t:e*4.5,  ns:mn,  v:.50,d:e*.45});
    }else{
      hits.push({t:0,      ns:allm,v:.85,d:q*.82});
      hits.push({t:q*.75,  ns:mn,  v:.50,d:q*.45});
    }
  }
  return hits;
}

// ─── WEB AUDIO ENGINE ────────────────────────────────────────────
let AC=null;
let masterComp=null;
function getAC(){
  if(!AC||AC.state==="closed"){
    AC=new(window.AudioContext||window.webkitAudioContext)();
    // 마스터 컴프레서 — 전체 믹스 보호
    masterComp=AC.createDynamicsCompressor();
    masterComp.threshold.value=-18;
    masterComp.knee.value=6;
    masterComp.ratio.value=3;
    masterComp.attack.value=0.003;
    masterComp.release.value=0.25;
    masterComp.connect(AC.destination);
  }
  if(AC.state==="suspended") AC.resume();
  return AC;
}
function freqOf(noteName){
  const m=(noteName||"").match(/^([A-G]#?)(\d+)$/);if(!m)return 0;
  return 440*Math.pow(2,(CHR.indexOf(m[1])+(parseInt(m[2])+1)*12-69)/12);
}

// 스타일별 배음 배열 (정규화된 진폭)
const SCFG={
  piano: {p:[1,.52,.20,.08,.035,.015],   bp:[1,.65,.28,.10,.04], rev:0.22, revT:1.4},
  guitar:{p:[1,.78,.48,.26,.13,.06,.025],bp:[1,.55,.22,.08],     rev:0.12, revT:0.7},
  ballad:{p:[1,.32,.12,.055,.022],       bp:[1,.48,.18,.07],     rev:0.48, revT:2.2},
  pop:   {p:[1,.65,.32,.16,.08,.03],     bp:[1,.52,.20,.08],     rev:0.20, revT:1.0},
};

// 단순하고 깔끔한 노트 재생 — 피드백 루프 없음
function playNote(freq,vel,dur,startTime,partials,revAmt,style){
  if(!freq||freq<=0||vel<=0)return;
  const ac=getAC();
  const dest=masterComp||ac.destination;

  // 배음 합산 게인
  const masterG=ac.createGain();
  const v=Math.min(0.85, vel*0.65);  // 최대 0.85로 헤드룸 확보

  // 스타일별 어택/디케이
  const atk = style==="ballad"?0.35: style==="piano"?0.006: style==="guitar"?0.003:0.010;
  const dcy = style==="ballad"?0.08: style==="piano"?0.0: style==="guitar"?0.0:0.0;
  const sus = style==="ballad"?0.92: style==="piano"?0.0: style==="guitar"?0.02:0.45;

  masterG.gain.setValueAtTime(0, startTime);
  masterG.gain.linearRampToValueAtTime(v, startTime+atk);
  if(dcy>0) masterG.gain.setTargetAtTime(v*sus, startTime+atk, dcy);
  masterG.gain.setTargetAtTime(0.0001, startTime+dur*0.75, dur*0.18);

  // 배음 생성
  const numPartials=Math.min(partials.length, 6);
  // 전체 배음 에너지 정규화
  const totalAmp=partials.slice(0,numPartials).reduce((s,a)=>s+a,0)||1;

  for(let i=0;i<numPartials;i++){
    const amp=partials[i];
    if(amp<0.01)continue;
    const osc=ac.createOscillator();
    const og=ac.createGain();
    osc.type="sine";
    osc.frequency.value=freq*(i+1);
    og.gain.value=amp/totalAmp; // 정규화
    osc.connect(og);
    og.connect(masterG);
    osc.start(startTime);
    osc.stop(startTime+dur+0.15);
  }

  // 리버브: 간단한 단일 지연 (피드백 없음 → 왜곡 없음)
  if(revAmt>0){
    const revDelay=ac.createDelay(0.6);
    revDelay.delayTime.value=style==="ballad"?0.22:0.12;
    const revG=ac.createGain();
    revG.gain.value=revAmt*0.5;
    masterG.connect(revG);
    revG.connect(revDelay);
    revDelay.connect(dest);
  }

  masterG.connect(dest);
}

// 소리 재생 — getHits() 결과를 Web Audio로 스케줄
function playChordPattern(ch,style,ts,bpm,startDelay){
  const ac=getAC();
  const now=ac.currentTime+(startDelay||0.05);
  const cfg=SCFG[style]||SCFG.piano;
  getHits(ch,style,ts,bpm).forEach(h=>{
    h.ns.forEach((n,i)=>{
      const fr=freqOf(n);if(!fr)return;
      const isBass=fr<freqOf("C3");
      const parts=isBass?cfg.bp:cfg.p;
      const vel=h.v*(1-i*0.03);
      playNote(fr,vel,h.d,now+h.t,parts,cfg.rev,style);
    });
  });
}

// ─── MIDI EXPORT (getHits()와 동일 패턴 사용) ────────────────────
function vl(v){v=Math.max(0,v);const b=[];b.push(v&127);v>>=7;while(v>0){b.push((v&127)|128);v>>=7;}return b.reverse();}

function dlMidi(prog,bpm,ts,style){
  if(!prog.length)return;
  const tpq=480,tmp=Math.round(60000000/bpm);
  const[num,den]=ts.split("/").map(Number);
  const mT={"4/4":4,"3/4":3,"6/8":6,"2/4":2}[ts]||4;
  const bT=ts==="6/8"?tpq/2:tpq;
  const mTicks=mT*bT;
  const mSec=getMD(ts,bpm);
  const evts=[];
  evts.push({tick:0,b:[255,81,3,(tmp>>16)&255,(tmp>>8)&255,tmp&255]});
  evts.push({tick:0,b:[255,88,4,num,Math.round(Math.log2(den)),24,8]});
  let cur=0;
  prog.forEach(ch=>{
    // getHits()로 소리와 완전히 동일한 패턴 생성
    const hits=getHits(ch,style,ts,bpm);
    hits.forEach(h=>{
      const tk=cur+Math.round(h.t/mSec*mTicks);
      const dt=Math.max(1,Math.round(h.d/mSec*mTicks));
      const vv=Math.min(127,Math.round(h.v*100));
      h.ns.forEach(n=>{
        const m=n2m(n);if(m<0||m>127)return;
        evts.push({tick:tk,     b:[144,m,vv]});
        evts.push({tick:tk+dt,  b:[128,m,0]});
      });
    });
    cur+=mTicks*(ch.div||1);
  });
  evts.push({tick:cur,b:[255,47,0]});
  evts.sort((a,b)=>a.tick-b.tick||(a.b[0]===128&&b.b[0]===144?-1:1));
  const tb=[];let prev=0;evts.forEach(e=>{tb.push(...vl(e.tick-prev));prev=e.tick;tb.push(...e.b);});
  const tl=tb.length;
  const bytes=new Uint8Array([77,84,104,100,0,0,0,6,0,0,0,1,(tpq>>8)&255,tpq&255,77,84,114,107,(tl>>24)&255,(tl>>16)&255,(tl>>8)&255,tl&255,...tb]);
  let bin="";for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  const a=document.createElement("a");

async function doAudioAnalyze(event){
  const file=event.target.files[0];if(!file)return;
  ST.audioLoad=true;ST.audioRes=null;render();
  try{
    const ab=await file.arrayBuffer();const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const decoded=await ctx.decodeAudioData(ab);const ch0=decoded.getChannelData(0),sr=decoded.sampleRate;
    const notes=[];const fftSize=4096;
    for(let i=0;i<ch0.length-fftSize&&notes.length<32;i+=Math.floor(sr*.4)){
      const oc=new OfflineAudioContext(1,fftSize,sr);const buf=oc.createBuffer(1,fftSize,sr);buf.copyToChannel(ch0.slice(i,i+fftSize),0);
      const src=oc.createBufferSource();src.buffer=buf;const an=oc.createAnalyser();an.fftSize=fftSize;src.connect(an);an.connect(oc.destination);src.start();await oc.startRendering();
      const fd=new Float32Array(an.frequencyBinCount);an.getFloatFrequencyData(fd);const bs=sr/fftSize;let mx=-120,mi=-1;
      for(let b2=Math.floor(80/bs);b2<=Math.ceil(1200/bs)&&b2<fd.length;b2++){if(fd[b2]>mx){mx=fd[b2];mi=b2;}}
      if(mx>-55&&mi>0){const freq=mi*bs;const n=Math.round(12*Math.log2(freq/440)+69);const nm=CHR[((n%12)+12)%12];if(nm)notes.push(nm);}
    }
    ctx.close();const cnt={};notes.forEach(n=>cnt[n]=(cnt[n]||0)+1);
    const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([n])=>n);
    ST.audioRes={notes:top,suggestions:suggestFromNotes(top)};
  }catch{ST.audioRes={notes:[],suggestions:[{chords:"-",key:"?",scale:"?",desc:"파일 분석 실패. mp3/wav를 사용해주세요.",tag:"오류"}]};}
  ST.audioLoad=false;render();
}
async function startHum(){
  ST.humState="counting";ST.humNotes=[];ST.humRes=null;ST.humCnt=3;render();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
    try{const d=await navigator.mediaDevices.enumerateDevices();const mic=d.find(x=>x.kind==="audioinput"&&x.label);ST.micLabel=mic?mic.label:"기본 마이크";}catch{}
    ST.micPerm="granted";
    const ctx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
    const src=ctx.createMediaStreamSource(stream);const an=ctx.createAnalyser();an.fftSize=8192;an.smoothingTimeConstant=0.6;src.connect(an);
    for(let c=3;c>=1;c--){ST.humCnt=c;render();await new Promise(r=>setTimeout(r,1000));}
    ST.humState="recording";ST.humCnt=6;render();
    const collected=[];
    for(let s2=0;s2<6;s2++){
      for(let j=0;j<4;j++){
        const fd=new Float32Array(an.frequencyBinCount);an.getFloatFrequencyData(fd);
        const bs=ctx.sampleRate/an.fftSize;let mx=-80,mi=-1;
        for(let i=Math.floor(65/bs);i<=Math.ceil(1200/bs)&&i<fd.length;i++){if(fd[i]>mx){mx=fd[i];mi=i;}}
        if(mx>-55&&mi>0){const freq=mi*bs;const n=Math.round(12*Math.log2(freq/440)+69);const nm=CHR[((n%12)+12)%12];if(nm)collected.push(nm);}
        await new Promise(r=>setTimeout(r,250));
      }
      ST.humCnt=5-s2;render();
    }
    stream.getTracks().forEach(t=>t.stop());ctx.close();
    ST.humState="analyzing";render();
    const cnt={};collected.forEach(n=>cnt[n]=(cnt[n]||0)+1);
    const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([n])=>n);
    ST.humNotes=top;if(!top.length){ST.humState="error";render();return;}
    ST.humRes=suggestFromNotes(top);ST.humState="done";render();
  }catch(e){ST.micPerm=e.name==="NotAllowedError"?"denied":"unknown";ST.humState=e.name==="NotAllowedError"?"denied":"error";render();}
}

  // Drag reorder
  document.querySelectorAll(".di").forEach((el,idx)=>{
    el.addEventListener("dragstart",e=>{dragSrc=idx;e.dataTransfer.effectAllowed="move";setTimeout(()=>el.style.opacity=".35",0);});
    el.addEventListener("dragend",()=>{el.style.opacity="1";dragSrc=-1;document.querySelectorAll(".di").forEach(i=>{i.style.borderTop="";i.style.borderBottom="";});});
    el.addEventListener("dragover",e=>{e.preventDefault();document.querySelectorAll(".di").forEach(i=>{i.style.borderTop="";i.style.borderBottom="";});if(idx<dragSrc)el.style.borderTop="2px solid "+acc;else if(idx>dragSrc)el.style.borderBottom="2px solid "+acc;});
    el.addEventListener("drop",e=>{e.preventDefault();document.querySelectorAll(".di").forEach(i=>{i.style.borderTop="";i.style.borderBottom="";});if(dragSrc>=0&&dragSrc!==idx)moveChord(dragSrc,idx);dragSrc=-1;});
  });
}

window.padPreview=padPreview;window.addToProg=addToProg;window.startPlay=startPlay;window.stopPlay=stopPlay;
window.startEPlay=startEPlay;window.stopEPlay=stopEPlay;window.setVoicing=setVoicing;window.moveChord=moveChord;
window.previewAIProg=previewAIProg;window.loadProg=loadProg;window.loadPreset=loadPreset;window.loadRare=loadRare;
function toggleEPlay(){if(ST.ePlaying)stopEPlay();else startEPlay();}
function togglePlay(){if(ST.playing)stopPlay();else startPlay();}
window.removeChord=removeChord;
window.toggleEPlay=toggleEPlay;
window.previewRegChord=previewRegChord;
window.loadRegChord=loadRegChord;
window.togglePlay=togglePlay;window.dlMidi=dlMidi;window.getSmartRec=getSmartRec;window.doSongSearch=doSongSearch;
window.doAudioAnalyze=doAudioAnalyze;window.startHum=startHum;window.ST=ST;
window.render=render;

render();
})();
</script>
